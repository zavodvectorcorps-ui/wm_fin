events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    upstream backend {
        server backend:8001;
    }
    upstream frontend {
        server frontend:80;
    }

    upstream wmfinance_backend {
        server wmfinance-backend:8001;
    }
    upstream wmfinance_frontend {
        server wmfinance-frontend:3000;
    }

    # ============ HTTP -> HTTPS redirect + ACME challenge ============
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============ rest-menu.by HTTPS ============
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name rest-menu.by www.rest-menu.by;

        ssl_certificate /etc/nginx/ssl/live/rest-menu.by/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/rest-menu.by/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 20M;

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # ============ wm-finance.pl HTTPS ============
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name wm-finance.pl www.wm-finance.pl;

        ssl_certificate /etc/nginx/ssl/live/wm-finance.pl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/wm-finance.pl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        client_max_body_size 50M;

        location /api/ {
            proxy_pass http://wmfinance_backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /webhook/ {
            proxy_pass http://wmfinance_backend/webhook/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://wmfinance_frontend/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ============ Кастомные домены клиентов ============
    # Server-блоки для клиентских доменов Menu_rest2 лежат в /etc/nginx/custom-domains/
    # и НЕ отслеживаются git'ом. Они создаются скриптом add-domain.sh.
    # NB: директива ниже должна быть ПОСЛЕДНЕЙ в http {}.
    include /etc/nginx/custom-domains/*.conf;
}
