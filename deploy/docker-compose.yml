services:
  wmfinance-mongo:
    image: mongo:7
    container_name: wmfinance-mongo
    restart: unless-stopped
    volumes:
      - wmfinance-mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - wmfinance-net

  wmfinance-backend:
    build:
      context: ./backend
      dockerfile: ../backend.Dockerfile
    container_name: wmfinance-backend
    restart: unless-stopped
    depends_on:
      - wmfinance-mongo
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URL=mongodb://wmfinance-mongo:27017
      - DB_NAME=wmfinance
    # No external port mapping — accessed via Docker network from menu_rest2-nginx
    expose:
      - "8001"
    networks:
      - wmfinance-net
      - menu_rest2-shared

  wmfinance-frontend:
    build:
      context: ./frontend
      dockerfile: ../frontend.Dockerfile
      args:
        REACT_APP_BACKEND_URL: https://wm-finance.pl
    container_name: wmfinance-frontend
    restart: unless-stopped
    depends_on:
      - wmfinance-backend
    expose:
      - "3000"
    networks:
      - wmfinance-net
      - menu_rest2-shared

volumes:
  wmfinance-mongo-data:

networks:
  wmfinance-net:
    driver: bridge
  # External network managed by menu_rest2 — used by its nginx to proxy our containers
  menu_rest2-shared:
    external: true
    name: menu_rest2_default
