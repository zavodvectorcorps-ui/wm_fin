services:
  wmfinance-mongo:
    image: mongo:7
    container_name: wmfinance-mongo
    restart: unless-stopped
    volumes:
      - wmfinance-mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
    networks:
      - wmfinance-net

  wmfinance-backend:
    build:
      context: ./backend
      dockerfile: ../backend.Dockerfile
    container_name: wmfinance-backend
    restart: unless-stopped
    depends_on:
      - wmfinance-mongo
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URL=mongodb://wmfinance-mongo:27017
      - DB_NAME=wmfinance
    # Expose only on localhost so host nginx can proxy to it.
    # External traffic still goes through nginx -> 127.0.0.1:8001
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - wmfinance-net

  wmfinance-frontend:
    build:
      context: ./frontend
      dockerfile: ../frontend.Dockerfile
      args:
        REACT_APP_BACKEND_URL: https://wm-finance.pl
    container_name: wmfinance-frontend
    restart: unless-stopped
    depends_on:
      - wmfinance-backend
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - wmfinance-net

volumes:
  wmfinance-mongo-data:

networks:
  wmfinance-net:
    driver: bridge
