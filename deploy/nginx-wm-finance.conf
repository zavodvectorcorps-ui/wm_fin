server {
    listen 80;
    server_name wm-finance.pl www.wm-finance.pl;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wm-finance.pl www.wm-finance.pl;

    ssl_certificate     /etc/letsencrypt/live/wm-finance.pl/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wm-finance.pl/privkey.pem;

    # API -> Backend
    location /api/ {
        proxy_pass http://wmfinance-backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # For file uploads
        client_max_body_size 50M;
    }

    # Telegram webhook
    location /webhook/ {
        proxy_pass http://wmfinance-backend:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend (SPA)
    location / {
        proxy_pass http://wmfinance-frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
